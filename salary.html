<!DOCTYPE html>
<html>
<head>
    <title>Salary Details</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            margin:0;
        }

        .topbar{
            background:#343f93;
            color:white;
            padding:15px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        .container{
            width:60%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.2);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            padding:12px;
            text-align:left;
            border-bottom:1px solid #ddd;
        }

        th{
            background:#343f93;
            color:white;
        }

        .net{
            font-weight:bold;
            color:green;
        }
    </style>

</head>
<body>

<div class="topbar">
    Teacher Salary Details
</div>

<div class="container">

<table>
    <tr>
        <th>Teacher Name</th>
        <td>Rahul Sharma</td>
    </tr>

    <tr>
        <th>Month</th>
        <td>March</td>
    </tr>

    <tr>
        <th>Basic Salary</th>
        <td>₹40,000</td>
    </tr>

    <tr>
        <th>Bonus</th>
        <td>₹5,000</td>
    </tr>

    <tr>
        <th>Deduction</th>
        <td>₹2,000</td>
    </tr>

    <tr>
        <th>Net Salary</th>
        <td class="net">₹43,000</td>
    </tr>

</table>

</div>

</body>
</html>
