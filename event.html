<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anand Utsav 2026</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #fff8e1;
      color: #333;
    }
    .poster {
      max-width: 600px;
      margin: 40px auto;
      padding: 30px;
      border: 5px dashed #ff6f00;
      background: linear-gradient(to bottom, #fffde7, #fff3e0);
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }
    .poster h1 {
      font-size: 48px;
      color: #d84315;
      margin-bottom: 10px;
    }
    .poster h2 {
      font-size: 36px;
      color: #00897b;
      margin-bottom: 20px;
    }
    .poster p {
      font-size: 20px;
      margin: 10px 0;
    }
    .highlight {
      font-weight: bold;
      color: #6a1b9a;
    }
  </style>
</head>
<body>
  <div class="poster">
    <img src="../image/anand utsav.png" alt="Anand Utsav 2026 Poster" style="max-width:100%; margin-top:20px;">
  </div>
</body>
</html>
