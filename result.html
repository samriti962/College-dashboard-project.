<!DOCTYPE html>
<html>
<head>
<title>Result Status</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(135deg,#2c3e50,#4ca1af);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:#f9f9f9;
    padding:35px;
    width:420px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

h2{
    color:#333;
    margin-bottom:20px;
}

.not{
    color:#e74c3c;
    font-weight:bold;
    font-size:18px;
}

.internal{
    color:#27ae60;
    font-weight:bold;
    margin-top:10px;
}

.info{
    color:#555;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>Result Status</h2>

<p class="not">Final Result is not available right now</p>

<p class="internal">Internal Marks are available</p>

<p class="info">Please check again later for the final result.</p>

</div>

</body>
</html>
