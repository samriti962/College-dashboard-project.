<!DOCTYPE html>
<html>
<head>
    <title>Academia</title>
    <style>
        body {
            font-family: Arial;
            background: #e3e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-top: 10px;
        }

        .college-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: black;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        .btn {
            display: block;
            background: #1e3a8a;
            color: white;
            padding: 10px 20px;
            margin-top: 10px;
            text-align: center;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover {
            background: #0f1f4d;
        }
    </style>
</head>
<body>

<div class="login-box">

<div class="college-name">
    Guru Nanak Dev Engineering College
    <br><br>
    <img src="image/logo.png" class="logo" alt="College Logo">
</div>

<h1>Student Login</h1>

<input type="text" placeholder="College Roll Number">
<input type="password" placeholder="Password">

<a href="Pages/2ps.html" class="btn">Open Student Profile</a>
<a href="Pages/3pt.html" class="btn">Open Teacher Profile</a>

</div>

</body>
</html>
